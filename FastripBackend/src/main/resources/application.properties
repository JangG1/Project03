# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/Fastrip?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=Fastrip
spring.datasource.password=1234

#Server
server.port=8200
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JPA
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=create
#spring.jpa.show-sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.use-new-id-generator-mappings=false

#debug report disable(temp)
logging.level.org.springframework=error
logging.level.org.springframework.web=error
#conditions evaluation report disable
logging.level.org.springframework.boot.autoconfigure=error
spring.mvc.log-request-details=true
 

